name: CI

on:
  - push

jobs:
  prettier:
    runs-on: ubuntu-latest
    name: Prettier
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: "npm"
      - run: npm ci
      - run: npx prettier -c .

  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v5
        with:
          name: redirect-origin
          path: dist/
          if-no-files-found: error
